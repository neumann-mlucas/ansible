name: lint

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install tools
        run: |
          python -m pip install --upgrade pip
          pip install "ansible-core>=2.20" ansible-lint yamllint

      - name: Install collections
        run: ansible-galaxy collection install -r collections/requirements.yml

      - name: yamllint
        run: yamllint .

      - name: ansible-lint
        run: ansible-lint

      - name: ansible syntax-check
        run: |
          for pb in playbooks/*.yml site.yml; do
            echo "== $pb =="
            ansible-playbook --syntax-check "$pb"
          done

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ludeeus/action-shellcheck@master
        with:
          scandir: "."
