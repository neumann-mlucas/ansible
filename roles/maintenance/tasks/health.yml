- name: Ensure common services are running
  ansible.builtin.systemd_service:
    name: "{{ item }}"
    state: started
  loop:
    - NetworkManager.service
    - docker.service
    - fail2ban.service
    - sshd.service
    - syncthing@{{ username }}.service
    - ufw.service
  become: yes
  ignore_errors: yes
#
- name: Ensure desktop services are running
  ansible.builtin.systemd_service:
    name: "{{ item }}"
    state: started
  loop:
    - gdm.service
    - keyd.service
    - thermald.service
  become: yes
  ignore_errors: yes
  when: is_desktop
#
- name: Ensure server services are running
  ansible.builtin.systemd_service:
    name: "{{ item }}"
    state: started
  loop:
    - jellyfin.service
    - pihole-FTL.service
    - syncthing@{{ username }}.service
  become: yes
  ignore_errors: yes
  when: is_server
#
- name: Check for failed systemd services
  ansible.builtin.command: systemctl --failed --no-legend
  register: failed_services
  changed_when: false
#
- name: Report failed services
  ansible.builtin.debug:
    msg: "Failed services detected: {{ failed_services.stdout_lines }}"
  when: failed_services.stdout | length > 0
#
- name: Check for critical journal errors since last boot
  ansible.builtin.shell:
    cmd: journalctl -p 3 -xb --no-pager -n 20
  register: journal_errors
  changed_when: false
#
- name: Report critical journal errors
  ansible.builtin.debug:
    msg: "{{ journal_errors.stdout_lines }}"
  when: journal_errors.stdout | length > 0
