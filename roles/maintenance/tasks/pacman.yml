---
- name: Full system upgrade
  community.general.pacman:
    update_cache: true
    upgrade: true
#
- name: Delete orphan packages
  ansible.builtin.shell:
    cmd: set -o pipefail; pacman -Qtdq | xargs -r pacman -Rns --noconfirm || true
  args:
    executable: /bin/bash
  register: orphan_result
  changed_when: orphan_result.stdout | length > 0
#
- name: Clean pacman cache
  ansible.builtin.command: pacman -Sc --noconfirm
  changed_when: true
