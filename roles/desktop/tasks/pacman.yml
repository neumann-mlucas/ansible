- name: Install audio with pipewire
  community.general.pacman:
    name:
      - alsa-firmware
      - alsa-plugins
      - alsa-tools
      - pipewire-alsa
      - pipewire-audio
      - pipewire-jack
      - pipewire-pulse
      - pipewire-docs
      - sof-firmware
    state: present
#
- name: Install desktop environment
  community.general.pacman:
    name:
      - brightnessctl
      - cliphist
      - gnome
      - grim
      - hyprland
      - hyprpaper
      - hyprsunset
      - mako
      - slurp
      - wayland
      - wofi
      - waybar
      - xdg-desktop-portal
      - xdg-desktop-portal-gtk
      - xdg-desktop-portal-hyprland
    state: present
#
- name: Install pdf readers
  community.general.pacman:
    name:
      - zathura
      - zathura-djvu
      - zathura-pdf-mupdf
    state: present
#
- name: Install TUI tools
  community.general.pacman:
    name:
      - ghostty
      - lazydocker
      - lazygit
      - yazi
    state: present
#
- name: Install more CLI tools
  community.general.pacman:
    name:
      - dictd
      - firefox
      - flite
      - keyd
      - restic
      - mplayer
      - mpv
      - npm
      - surfraw
      - task
    state: present
#
- name: Install go toolchain
  community.general.pacman:
    name:
      - go
      - go-tools
    state: present
#
- name: Install kubernetes tools
  community.general.pacman:
    name:
      - k9s
      - kubectl
      - kubectx
    state: present
#
- name: Install fonts
  community.general.pacman:
    name:
      - ttf-fira-code
      - ttf-firacode-nerd
      - ttf-hack-nerd
      - ttf-iosevka-nerd
    state: present
#
- name: Install notebook stuff
  community.general.pacman:
    name:
      - tlp
    state: present
#
- name: Install python tools using uv
  ansible.builtin.shell:
    cmd: uv tool install {{ item }}
  register: uv_install_result
  changed_when: "'Already installed' not in uv_install_result.stdout"
  become: yes
  become_user: "{{ username }}"
  loop:
    - git-sim
    - radon
    - visidata
    - yt-dlp
