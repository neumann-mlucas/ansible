- name: Allow DNS traffic for pi-hole
  community.general.ufw:
    rule: allow
    port: '53'
    proto: "{{ item }}"
  loop:
    - tcp
    - udp
  become: yes
#
- name: Allow Jellyfin from local network
  community.general.ufw:
    rule: allow
    port: '8096'
    proto: tcp
    src: "192.168.15.0/24"
  become: yes
