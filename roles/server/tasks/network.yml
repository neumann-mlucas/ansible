- name: Allow DNS traffic for pi-hole (LAN only)
  community.general.ufw:
    rule: allow
    port: '53'
    proto: "{{ item.proto }}"
    src: "{{ item.src }}"
  loop:
    - {proto: tcp, src: "192.168.15.0/24"}
    - {proto: udp, src: "192.168.15.0/24"}
  become: yes
#
- name: Allow pi-hole web UI
  community.general.ufw:
    rule: allow
    port: '8080'
    proto: tcp
    src: "192.168.15.0/24"
  become: yes
#
- name: Allow Jellyfin from local network
  community.general.ufw:
    rule: allow
    port: '8096'
    proto: tcp
    src: "192.168.15.0/24"
  become: yes
