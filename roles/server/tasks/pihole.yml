- name: Create pi-hole config directory
  ansible.builtin.file:
    path: /etc/pihole
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: yes
#
- name: Write pi-hole setupVars (pre-seeds non-interactive install)
  ansible.builtin.copy:
    dest: /etc/pihole/setupVars.conf
    content: |
      PIHOLE_INTERFACE={{ ansible_default_ipv4.interface }}
      IPV4_ADDRESS={{ static_ip }}/{{ network_prefix }}
      QUERY_LOGGING=true
      INSTALL_WEB_SERVER=true
      INSTALL_WEB_INTERFACE=true
      LIGHTTPD_ENABLED=true
      BLOCKING_ENABLED=true
      WEBPASSWORD=
    owner: root
    group: root
    mode: "0644"
  become: yes
