---
- name: Enable server systemd services
  ansible.builtin.systemd_service:
    name: "{{ item }}"
    enabled: true
    state: started
    masked: false
    daemon_reload: true
  loop:
    - jellyfin.service
    - pihole-FTL.service
    - vaultwarden.service
    - glance.service
    - readeck.service
