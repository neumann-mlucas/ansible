- name: Install server packages
  import_tasks: pacman.yml
#
- name: Install AUR packages
  import_tasks: yay.yml
#
- name: Configure Jellyfin
  import_tasks: jellyfin.yml
#
- name: Configure pi-hole
  import_tasks: pihole.yml
#
- name: Configure Syncthing shared directory
  import_tasks: syncthing.yml
#
- name: Configure backup storage
  import_tasks: backup.yml
#
- name: Configure server network and firewall
  import_tasks: network.yml
#
- name: Enable server services
  import_tasks: services.yml
#
- name: Reboot the system
  ansible.builtin.reboot:
    reboot_timeout: 10
