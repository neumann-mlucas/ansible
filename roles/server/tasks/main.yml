---
- name: Install server packages
  ansible.builtin.import_tasks: pacman.yml
#
- name: Install AUR packages
  ansible.builtin.import_tasks: yay.yml
#
- name: Configure Jellyfin
  ansible.builtin.import_tasks: jellyfin.yml
#
- name: Configure pi-hole
  ansible.builtin.import_tasks: pihole.yml
#
- name: Configure Syncthing shared directory
  ansible.builtin.import_tasks: syncthing.yml
#
- name: Configure backup storage
  ansible.builtin.import_tasks: backup.yml
#
- name: Configure server firewall
  ansible.builtin.import_tasks: network.yml
#
- name: Enable server services
  ansible.builtin.import_tasks: services.yml
#
- name: Reboot the system
  ansible.builtin.reboot:
    reboot_timeout: 120
