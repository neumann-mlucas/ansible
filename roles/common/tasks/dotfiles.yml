---
- name: Clone user dotfiles
  ansible.builtin.git:
    repo: "{{ dotfiles.url }}"
    dest: /home/{{ username }}/{{ dotfiles.destination }}
    accept_hostkey: "yes"
    update: "true"
    force: "yes"
  become: true
  become_user: "{{ username }}"
#
- name: Check bashrc stat
  ansible.builtin.stat:
    path: /home/{{ username }}/.bashrc
  register: file_stat_bashrc
#
- name: Delete bashrc so stow does not fail
  ansible.builtin.file:
    path: /home/{{ username }}/.bashrc
    state: absent
  when: file_stat_bashrc.stat.exists and not file_stat_bashrc.stat.islnk
#
- name: Check hyprland.config stat
  ansible.builtin.stat:
    path: /home/{{ username }}/.config/hypr/hyprland.conf
  register: file_stat_hypr
#
- name: Delete hyprland.conf so stow does not fail
  ansible.builtin.file:
    path: /home/{{ username }}/.config/hypr/hyprland.conf
    state: absent
  when: file_stat_hypr.stat.exists and not file_stat_hypr.stat.islnk
#
- name: Stow dotfiles
  ansible.builtin.command:
    cmd: stow -R -v --no-folding --dotfiles -t ~ -d /home/{{ username }}/{{ dotfiles.destination }} .
  become: true
  become_user: "{{ username }}"
  register: stow_result
  changed_when: stow_result.stderr is search("LINK:|UNLINK:")
