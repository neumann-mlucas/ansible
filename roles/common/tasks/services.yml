---
- name: Disable containerd
  ansible.builtin.systemd_service:
    name: containerd.service
    enabled: false
    state: stopped
  become: true
  failed_when: false
#
- name: Enable multiple services
  ansible.builtin.systemd_service:
    name: "{{ item }}"
    enabled: true
    state: started
    masked: false
  loop:
    - NetworkManager.service
    - fail2ban.service
    - fstrim.timer
    - fwupd.service
    - reflector.timer
    - sshd.service
    - syncthing@{{ username }}.service
    - udisks2.service
    - ufw.service
