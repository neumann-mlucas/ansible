- name: change shell to zsh
  become: yes
  user:
    name: "{{ username }}"
    shell: /usr/bin/zsh
#
- name: Create docker group
  become: yes
  group:
    name: docker
    state: present
#
- name: Add user to docker group
  become: yes
  user:
    name: "{{ username }}"
    groups: docker
    append: yes
#
- name: Disable Docker iptables manipulation
  ansible.builtin.copy:
    dest: /etc/docker/daemon.json
    content: |
      {
        "iptables": false
      }
    owner: root
    group: root
    mode: "0644"
  become: yes
#
- name: Regenerate grub config
  ansible.builtin.command: grub-mkconfig -o /boot/grub/grub.cfg
  changed_when: false
#
- name: Change pacman config
  ansible.builtin.replace:
    path: /etc/pacman.conf
    regexp: "{{ item.regexp }}"
    replace: "{{ item.replace }}"
  with_items:
    - {regexp: "^#Color$", replace: "Color"}
    - {regexp: "^#VerbosePkgLists$", replace: "VerbosePkgLists"}
    - {regexp: "^#ParallelDownloads = 5$", replace: "ParallelDownloads = 20"}
#
- name: Change journald max log size
  ansible.builtin.replace:
    path: /etc/systemd/journald.conf
    regexp: "^#SystemMaxUse=$"
    replace: "SystemMaxUse=512M"
#
- name: Optimize vm.swappiness
  ansible.builtin.copy:
    dest: /etc/sysctl.d/10-swappiness.conf
    content: |
      vm.swappiness = 180
      vm.watermark_boost_factor = 0
      vm.watermark_scale_factor = 125
      vm.page-cluster = 0
    owner: root
    group: root
    mode: "0644"
  become: yes
#
- name: Set ip forwarding setting (docker needs this)
  ansible.builtin.copy:
    dest: /etc/sysctl.d/20-ipforwarding.conf
    content: |
      net.ipv4.ip_forward = 1
      net.ipv4.conf.all.forwarding = 1
      net.ipv6.conf.all.forwarding = 1
    owner: root
    group: root
    mode: "0644"
  become: yes
#
- name: Set zram config
  ansible.builtin.copy:
    dest: /etc/systemd/zram-generator.conf
    content: |
      [zram0]
      zram-size = ram
      compression-algorithm = zstd
    owner: root
    group: root
    mode: "0644"
  become: yes
#
- name: Start zram
  ansible.builtin.systemd_service:
    name: systemd-zram-setup@zram0.service
    state: started
    daemon_reload: true
  become: yes
