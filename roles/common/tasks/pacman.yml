---
- name: Install core software
  community.general.pacman:
    name:
      # kernel related
      - linux
      - linux-firmware
      - linux-headers
      - base
      - base-devel
      # core tools
      - git
      - zram-generator
      # firmware related
      - fwupd
      - fwupd-docs
      - intel-ucode
      - udisks2
    state: present
#
- name: Install system services
  community.general.pacman:
    name:
      - cronie
      - fail2ban
      - networkmanager
      - openssh
      - reflector
      - syncthing
      - thermald
      - ufw
    state: present
#
- name: Install GNU packages
  community.general.pacman:
    name:
      - coreutils
      - diffutils
      - findutils
      - gawk
      - gcc
      - gcc-libs
      - grep
      - make
      - man-db
      - man-pages
      - sed
      - tree
      - which
    state: present
#
- name: Install containerization related software
  community.general.pacman:
    name:
      - docker
      - docker-buildx
      - docker-compose
    state: present
#
- name: Install archival utils
  community.general.pacman:
    name:
      - atool
      - bzip2
      - gzip
      - 7zip
      - tar
      - unrar
      - unzip
      - xz
      - zip
    state: present
#
- name: Install network utils
  community.general.pacman:
    name:
      - curl
      - gping
      - iputils
      - net-tools
      - wget
    state: present
#
- name: Install python stuff
  community.general.pacman:
    name:
      - python
      - python-pip
      - uv
    state: present
#
- name: Install TUIs
  community.general.pacman:
    name:
      - bottom
      - neovim
      - python-pynvim
    state: present
#
- name: Install CLI tools
  community.general.pacman:
    name:
      - bash
      - bat
      - choose
      - ctags
      - difftastic
      - direnv
      - duf
      - dust
      - duckdb
      - expac
      - eza
      - fd
      - fzf
      - git-delta
      - github-cli
      - hyperfine
      - jq
      - procs
      - ripgrep
      - ripgrep-all
      - rsync
      - starship
      - stow
      - tealdeer
      - glow
      - tokei
      - typos
      - words
      - zoxide
      - zsh
      - zsh-autosuggestions
      - zsh-history-substring-search
      - zsh-syntax-highlighting
    state: present
